# Render Blueprint — deploys the whole Ana Small stack:
#   1. ana-small-backend : Flask API (SQL runner + OpenAI proxy + CSV upload)
#   2. ana-small-frontend: static Vite/React build that calls the backend
#
# No database is configured here. Users pick an engine (MySQL / Postgres /
# Snowflake / BigQuery / Databricks / ClickHouse) and enter their own credentials
# in the app's connector form; the backend runs each query against whatever
# credentials arrive with the request. The backend needs no DB env vars.
#
# After the first deploy, set VITE_BACKEND_API_URL on the frontend to the
# backend's public URL (https://ana-small-backend.onrender.com).

services:
  - type: web
    name: ana-small-backend
    runtime: python
    rootDir: local-backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --timeout 300 --workers 2
    healthCheckPath: /health
    # No env vars needed — neither DB creds nor OpenAI key live on the server.

  - type: web
    name: ana-small-frontend
    runtime: static
    rootDir: ana-small-main
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_BACKEND_API_URL   # set to the backend URL after first deploy
        sync: false
    routes:
      # SPA fallback so client-side routes resolve to index.html
      - type: rewrite
        source: /*
        destination: /index.html
