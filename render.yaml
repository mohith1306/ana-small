# Render Blueprint — deploys the whole Ana Small stack:
#   1. ana-small-backend : Flask API (SQL runner + OpenAI proxy + CSV upload)
#   2. ana-small-frontend: static Vite/React build that calls the backend
#
# The MySQL database is NOT defined here — you are pointing the backend at your
# own MySQL via the MYSQL_* env vars below (it must be reachable from Render,
# i.e. a public host/IP or a tunnel, NOT your laptop's localhost).
#
# After the first deploy, set VITE_BACKEND_API_URL on the frontend to the
# backend's public URL (https://ana-small-backend.onrender.com).

services:
  - type: web
    name: ana-small-backend
    runtime: python
    rootDir: local-backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --timeout 300 --workers 2
    healthCheckPath: /health
    envVars:
      # No OPENAI_API_KEY here — each user enters their own key in the app UI.
      - key: MYSQL_HOST          # publicly reachable MySQL host/IP
        sync: false
      - key: MYSQL_PORT
        value: "3306"
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DATABASE
        sync: false

  - type: web
    name: ana-small-frontend
    runtime: static
    rootDir: ana-small-main
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_BACKEND_API_URL   # set to the backend URL after first deploy
        sync: false
    routes:
      # SPA fallback so client-side routes resolve to index.html
      - type: rewrite
        source: /*
        destination: /index.html
